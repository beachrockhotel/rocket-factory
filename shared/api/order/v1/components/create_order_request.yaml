type: object
required:
  - user_uuid
  - part_uuids
properties:
  user_uuid:
    type: string
    format: uuid
    description: UUID пользователя, создающего заказ
  part_uuids:
    type: array
    items:
      type: string
      format: uuid
    description: Список UUID компонентов для заказа
    minItems: 1
