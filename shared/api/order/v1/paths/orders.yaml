post:
  summary: Create a new order
  operationId: CreateOrder
  tags:
    - Orders
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/create_order_request.yaml
  responses:
    '201':
      description: Order successfully created
      content:
        application/json:
          schema:
            $ref: ../components/create_order_response.yaml
    '400':
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: ../components/errors/bad_request_error.yaml
    '401':
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: ../components/errors/unauthorized_error.yaml
    '403':
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: ../components/errors/forbidden_error.yaml
    '422':
      description: Unprocessable entity - semantic errors
      content:
        application/json:
          schema:
            $ref: ../components/errors/validation_error.yaml
    '429':
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: ../components/errors/rate_limit_error.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components/errors/internal_server_error.yaml
    '503':
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: ../components/errors/service_unavailable_error.yaml
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components/errors/generic_error.yaml
