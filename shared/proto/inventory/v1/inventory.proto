syntax = "proto3";

package inventory.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/beachrockhotel/rocket-factory/shared/pkg/proto/order/grpc;inventory_v1";

service InventoryService {
  // Возвращает информацию о детали по её UUID.
  rpc GetPart(GetPartRequest) returns (GetPartResponse);
  // Возвращает список деталей с возможностью фильтрации.
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

// Поиск детали по ID
message GetPartRequest {
  string uuid = 1;
}

// Ответ с найденной деталью
message GetPartResponse {
  Part part = 1;
}

// Запрос на фильтрацию деталей
message ListPartsRequest {
  PartsFilter filter = 1;
}

// Отфильтрованные детали
message ListPartsResponse {
  repeated Part parts = 1;
}

// Структура детали
message Part {
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Dimensions dimensions = 7;
  Manufacturer manufacturer = 8;
  repeated string tags = 9;
  // Гибкие метаданные
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// Категории детали
enum Category {
  // Неизвестная категория
  CATEGORY_UNKNOWN_UNSPECIFIED = 0;
  // Двигатель
  CATEGORY_ENGINE = 1;
  // Топливо
  CATEGORY_FUEL = 2;
  // Иллюминатор
  CATEGORY_PORTHOLE = 3;
  // Крыло
  CATEGORY_WING = 4;
}

// Размеры детали
message Dimensions {
  double length = 1;
  double width = 2;
  double height = 3;
  double weight = 4;
}

// Производитель детали
message Manufacturer {
  string name = 1;
  string country = 2;
  string website = 3;
}

// Виды метаданных
message Value {
  oneof kind {
    string string_value = 1;
    int64 int64_value = 2;
    double double_value = 3;
    bool bool_value = 4;
  }
}

// Фильтрация деталей
message PartsFilter {
  repeated google.protobuf.StringValue uuids = 1;
  repeated google.protobuf.StringValue names = 2;
  repeated Category categories = 3;
  repeated google.protobuf.StringValue manufacturer_countries = 4;
  repeated google.protobuf.StringValue tags = 5;
}